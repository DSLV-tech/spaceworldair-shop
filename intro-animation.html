<!DOCTYPE html>
<html lang="it">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width,initial-scale=1">
<title>Space World Air — Intro</title>
<link href="https://fonts.googleapis.com/css2?family=Anybody:ital,wdth,wght@0,75..125,100..900&display=swap" rel="stylesheet">
<style>
*,*::before,*::after{box-sizing:border-box;margin:0;padding:0}
:root{
  --c:#31BEF0;
  --bg:#07070f;
}
html,body{
  width:100%;height:100%;
  background:var(--bg);
  overflow:hidden;
  font-family:'Anybody',sans-serif;
}

/* ─── WRAPPER ─── */
#intro{
  position:fixed;inset:0;
  display:flex;align-items:center;justify-content:center;
  background:var(--bg);
  z-index:9999;
  /* fade-out alla fine */
  animation:introExit .7s ease-in 4.1s forwards;
}
@keyframes introExit{
  to{opacity:0;pointer-events:none}
}

/* ─── CANVAS STELLE ─── */
#stars{position:absolute;inset:0}

/* ─── CONTENUTO CENTRALE ─── */
.intro-center{
  position:relative;
  display:flex;
  flex-direction:column;
  align-items:center;
  gap:2.2rem;
}

/* ─── GLOBO SVG ─── */
#globe-wrap{
  position:relative;
  width:160px;height:160px;
}
#globe-wrap svg{
  width:160px;height:160px;
}

/* Glow radiale dietro il globo */
#globe-glow{
  position:absolute;
  inset:-40px;
  border-radius:50%;
  background:radial-gradient(circle, rgba(49,190,240,.18) 0%, transparent 70%);
  opacity:0;
  animation:glowIn .8s ease 1.2s forwards;
}
@keyframes glowIn{to{opacity:1}}

/* Draw delle linee del globo */
.g-circle   { stroke-dasharray:283; stroke-dashoffset:283; animation:drawLine .9s ease .1s forwards }
.g-el1      { stroke-dasharray:284; stroke-dashoffset:284; animation:drawLine .7s ease .3s forwards }
.g-el2      { stroke-dasharray:284; stroke-dashoffset:284; animation:drawLine .7s ease .45s forwards }
.g-el3      { stroke-dasharray:284; stroke-dashoffset:284; animation:drawLine .7s ease .6s forwards }
.g-par1     { stroke-dasharray:300; stroke-dashoffset:300; animation:drawLine .6s ease .7s forwards }
.g-par2     { stroke-dasharray:300; stroke-dashoffset:300; animation:drawLine .6s ease .8s forwards }
.g-par3     { stroke-dasharray:300; stroke-dashoffset:300; animation:drawLine .6s ease .9s forwards }
.g-v        { stroke-dasharray:90;  stroke-dashoffset:90;  animation:drawLine .4s ease .55s forwards }
.g-h        { stroke-dasharray:90;  stroke-dashoffset:90;  animation:drawLine .4s ease .65s forwards }

@keyframes drawLine{to{stroke-dashoffset:0}}

/* Ring pulse finale */
.g-ring{
  position:absolute;
  inset:0;
  border-radius:50%;
  border:1px solid rgba(49,190,240,.5);
  transform:scale(1);
  opacity:0;
  animation:ringPulse 1s ease 1.1s forwards;
}
@keyframes ringPulse{
  0%  {transform:scale(.7);opacity:.8}
  60% {transform:scale(1.25);opacity:.4}
  100%{transform:scale(1.5);opacity:0}
}

/* ─── WORDMARK ─── */
.intro-wordmark{
  display:flex;
  flex-direction:column;
  align-items:center;
  gap:.6rem;
  overflow:hidden;
}

.wm-top{
  display:flex;
  align-items:baseline;
  gap:.3em;
  font-size:clamp(2rem,6vw,3.8rem);
  font-variation-settings:'wght' 900,'wdth' 75;
  letter-spacing:.03em;
  line-height:1;
}

.wm-space,
.wm-world{
  display:inline-block;
  color:#fff;
  opacity:0;
  transform:translateY(30px);
}
.wm-space{ animation: wordUp .6s cubic-bezier(.22,1,.36,1) 1.3s forwards }
.wm-world{ animation: wordUp .6s cubic-bezier(.22,1,.36,1) 1.5s forwards }

@keyframes wordUp{
  to{opacity:1;transform:translateY(0)}
}

.wm-air{
  display:inline-block;
  color:var(--c);
  opacity:0;
  transform:scale(.6);
  text-shadow:0 0 40px rgba(49,190,240,.8);
  animation:airPop .5s cubic-bezier(.34,1.56,.64,1) 1.75s forwards;
}
@keyframes airPop{
  to{opacity:1;transform:scale(1)}
}

/* Divisore */
.wm-rule{
  width:0;
  height:1px;
  background:linear-gradient(90deg,transparent,rgba(255,255,255,.4),transparent);
  animation:ruleGrow .6s ease 2s forwards;
}
@keyframes ruleGrow{to{width:clamp(240px,40vw,460px)}}

/* Tagline */
.wm-tagline{
  font-size:clamp(.55rem,.8vw,.75rem);
  letter-spacing:.32em;
  text-transform:uppercase;
  color:rgba(255,255,255,.45);
  font-variation-settings:'wght' 300,'wdth' 110;
  opacity:0;
  animation:tagFade .8s ease 2.2s forwards;
}
@keyframes tagFade{to{opacity:1}}

/* ─── BARRA PROGRESSO ─── */
#intro-bar{
  position:absolute;
  bottom:0;left:0;
  height:2px;
  background:var(--c);
  box-shadow:0 0 8px rgba(49,190,240,.6);
  width:0%;
  animation:barFill 3.6s cubic-bezier(.4,0,.2,1) .2s forwards;
}
@keyframes barFill{to{width:100%}}

/* ─── SCAN LINE ─── */
#scanline{
  position:absolute;
  inset:0;
  background:repeating-linear-gradient(
    0deg,
    transparent,
    transparent 3px,
    rgba(49,190,240,.015) 3px,
    rgba(49,190,240,.015) 4px
  );
  pointer-events:none;
  opacity:.5;
}

/* ─── ANGOLI DECORATIVI ─── */
.corner{
  position:absolute;
  width:20px;height:20px;
  opacity:0;
  animation:cornerIn .4s ease 2.3s forwards;
}
.corner-tl{top:24px;left:24px;border-top:1px solid rgba(49,190,240,.5);border-left:1px solid rgba(49,190,240,.5)}
.corner-tr{top:24px;right:24px;border-top:1px solid rgba(49,190,240,.5);border-right:1px solid rgba(49,190,240,.5)}
.corner-bl{bottom:24px;left:24px;border-bottom:1px solid rgba(49,190,240,.5);border-left:1px solid rgba(49,190,240,.5)}
.corner-br{bottom:24px;right:24px;border-bottom:1px solid rgba(49,190,240,.5);border-right:1px solid rgba(49,190,240,.5)}
@keyframes cornerIn{to{opacity:1}}

/* ─── SKIP ─── */
#skip{
  position:absolute;
  bottom:2.5rem;right:2rem;
  font-size:.6rem;
  letter-spacing:.2em;
  text-transform:uppercase;
  color:rgba(255,255,255,.2);
  font-variation-settings:'wght' 400;
  cursor:pointer;
  transition:color .2s;
  opacity:0;
  animation:tagFade .5s ease 2.5s forwards;
}
#skip:hover{color:rgba(255,255,255,.5)}
</style>
</head>
<body>

<div id="intro">
  <canvas id="stars"></canvas>
  <div id="scanline"></div>

  <!-- Angoli -->
  <div class="corner corner-tl"></div>
  <div class="corner corner-tr"></div>
  <div class="corner corner-bl"></div>
  <div class="corner corner-br"></div>

  <!-- Progress bar -->
  <div id="intro-bar"></div>

  <!-- Centro -->
  <div class="intro-center">

    <!-- Globo -->
    <div id="globe-wrap">
      <div id="globe-glow"></div>
      <div class="g-ring"></div>
      <svg viewBox="0 0 160 160" fill="none" xmlns="http://www.w3.org/2000/svg">
        <!-- Cerchio principale -->
        <circle class="g-circle" cx="80" cy="80" r="72" stroke="#31BEF0" stroke-width="1.5"/>
        <!-- Meridiani -->
        <ellipse class="g-el1" cx="80" cy="80" rx="28" ry="72" stroke="#31BEF0" stroke-width="1" opacity=".7"/>
        <ellipse class="g-el2" cx="80" cy="80" rx="52" ry="72" stroke="#31BEF0" stroke-width="1" opacity=".5"/>
        <ellipse class="g-el3" cx="80" cy="80" rx="65" ry="72" stroke="#31BEF0" stroke-width="1" opacity=".35"/>
        <!-- Linea verticale -->
        <line class="g-v" x1="80" y1="8" x2="80" y2="152" stroke="#31BEF0" stroke-width="1" opacity=".4"/>
        <!-- Linea orizzontale -->
        <line class="g-h" x1="8" y1="80" x2="152" y2="80" stroke="#31BEF0" stroke-width="1" opacity=".4"/>
        <!-- Paralleli -->
        <ellipse class="g-par1" cx="80" cy="56" rx="66" ry="15" stroke="#31BEF0" stroke-width="1" opacity=".55"/>
        <ellipse class="g-par2" cx="80" cy="80" rx="72" ry="11" stroke="#31BEF0" stroke-width="1" opacity=".55"/>
        <ellipse class="g-par3" cx="80" cy="104" rx="66" ry="15" stroke="#31BEF0" stroke-width="1" opacity=".55"/>
      </svg>
    </div>

    <!-- Wordmark -->
    <div class="intro-wordmark">
      <div class="wm-top">
        <span class="wm-space">SPACE</span>
        <span class="wm-world">WORLD</span>
        <span class="wm-air">AIR</span>
      </div>
      <div class="wm-rule"></div>
      <div class="wm-tagline">Inflatable Furniture &amp; Event Decoration</div>
    </div>

  </div>

  <div id="skip" onclick="skipIntro()">SKIP ›</div>
</div>

<script>
/* ─── STELLE ─── */
const cvs = document.getElementById('stars');
const ctx = cvs.getContext('2d');
let W,H,stars=[];

function resize(){
  W = cvs.width  = window.innerWidth;
  H = cvs.height = window.innerHeight;
  stars = [];
  for(let i=0;i<280;i++){
    stars.push({
      x: Math.random()*W,
      y: Math.random()*H,
      r: Math.random()*1.3+.2,
      o: Math.random()*.7+.1,
      s: Math.random()*.5+.2,
      t: Math.random()*Math.PI*2,
      c: Math.random()<.05 ? '#31BEF0' : '#ffffff'
    });
  }
}

function draw(){
  ctx.clearRect(0,0,W,H);
  const t = Date.now()/1800;
  stars.forEach(s=>{
    const pulse = .5 + .5*Math.sin(t*s.s + s.t);
    ctx.beginPath();
    ctx.arc(s.x, s.y, s.r, 0, Math.PI*2);
    ctx.fillStyle = s.c === '#31BEF0'
      ? `rgba(49,190,240,${s.o * pulse})`
      : `rgba(255,255,255,${s.o * pulse})`;
    ctx.fill();
  });
  requestAnimationFrame(draw);
}

window.addEventListener('resize', resize);
resize();
draw();

/* ─── SKIP ─── */
function skipIntro(){
  document.getElementById('intro').style.animation='none';
  document.getElementById('intro').style.opacity='0';
  document.getElementById('intro').style.pointerEvents='none';
}

/* ─── RIMOZIONE DAL DOM ─── */
document.getElementById('intro').addEventListener('animationend', e=>{
  if(e.animationName === 'introExit'){
    document.getElementById('intro').remove();
  }
});
</script>
</body>
</html>
