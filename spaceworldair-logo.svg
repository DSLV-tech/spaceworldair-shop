<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 540 120" fill="none">
  <!-- ICON: Premium Wireframe Globe -->
  <g stroke="#FFFFFF" stroke-width="0.8" opacity="0.9">
    <circle cx="50" cy="60" r="45" />
    <ellipse cx="50" cy="60" rx="10" ry="45" opacity="0.6"/>
    <ellipse cx="50" cy="60" rx="22" ry="45" />
    <ellipse cx="50" cy="60" rx="34" ry="45" opacity="0.6"/>
    <ellipse cx="50" cy="60" rx="45" ry="10" opacity="0.6"/>
    <ellipse cx="50" cy="60" rx="45" ry="22" />
    <ellipse cx="50" cy="60" rx="45" ry="34" opacity="0.6"/>
    <line x1="50" y1="15" x2="50" y2="105" />
    <line x1="5" y1="60" x2="95" y2="60" />
  </g>

  <!-- TEXT: Main Brand — SPACE WORLD white, AIR cyan -->
  <text x="115" y="54" style="font-family:'Anybody', sans-serif; font-variation-settings: 'wght' 900, 'wdth' 110; font-size:42px; text-transform:uppercase;">
    <tspan fill="#FFFFFF">SPACE WORLD </tspan><tspan fill="#31BEF0">AIR</tspan>
  </text>
  
  <!-- SEPARATOR: Matches exact text width estimation -->
  <rect x="115" y="64" width="400" height="1.5" fill="#FFFFFF" opacity="0.8" />
  
  <!-- SUBTITLE: Inflatable Furniture -->
  <text x="115" y="94" fill="#FFFFFF" style="font-family:'Anybody', sans-serif; font-variation-settings: 'wght' 300, 'wdth' 90; font-size:20px; letter-spacing:0.24em; text-transform:uppercase;">INFLATABLE FURNITURE</text>
</svg>
