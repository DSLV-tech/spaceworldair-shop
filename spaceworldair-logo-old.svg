<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 100 106" fill="none">
<defs>

  <!--
    BALLOON GRADIENT
    Light source: upper-left.
    4 stops — white-cyan highlight → brand cyan → mid shadow → deep navy.
    Simulates an inflated, spherical form.
  -->
  <radialGradient id="BG" cx="28" cy="20" r="78" gradientUnits="userSpaceOnUse">
    <stop offset="0%"   stop-color="#D4F7FF"/>
    <stop offset="32%"  stop-color="#31BEF0"/>
    <stop offset="72%"  stop-color="#0C6A9A"/>
    <stop offset="100%" stop-color="#042E4A"/>
  </radialGradient>

  <!--
    SPECULAR HIGHLIGHT
    Small bright ellipse on the lit face of the balloon.
    Gives it the taut-skin look of a real inflatable.
  -->
  <radialGradient id="SH" cx="30" cy="27" r="20" gradientUnits="userSpaceOnUse">
    <stop offset="0%"   stop-color="rgba(255,255,255,0.62)"/>
    <stop offset="100%" stop-color="rgba(255,255,255,0)"/>
  </radialGradient>

  <!--
    ORBIT STROKE GRADIENT (for front arc)
    Slightly fades at the endpoints — where the ring
    curves away from us — and is brightest at the center.
    Gives the orbit ring a sense of volume.
  -->
  <linearGradient id="OG" x1="97" y1="74" x2="3" y2="30" gradientUnits="userSpaceOnUse">
    <stop offset="0%"   stop-color="rgba(255,255,255,0.30)"/>
    <stop offset="30%"  stop-color="rgba(255,255,255,0.95)"/>
    <stop offset="70%"  stop-color="rgba(255,255,255,0.95)"/>
    <stop offset="100%" stop-color="rgba(255,255,255,0.30)"/>
  </linearGradient>

  <!--
    BACK-ARC MASK
    White = visible. Black = hidden (punched out by balloon shape).
    Applied to the back orbit arc so it is only visible
    in the open space OUTSIDE the balloon body.
  -->
  <mask id="BAM">
    <rect width="100" height="106" fill="white"/>
    <path d="
      M 50 88
      C 36 84, 8 68, 8 50
      C 8 32, 18 16, 34 10
      C 40 7, 48 13, 50 22
      C 52 13, 60 7, 66 10
      C 82 16, 92 32, 92 50
      C 92 68, 64 84, 50 88 Z
    " fill="black"/>
  </mask>

</defs>


<!-- ═══════════════════════════════════════════════
     LAYER 1 — BACK ORBIT ARC
     Full ellipse, dashed, masked to appear only
     in the open space left and right of the balloon.
     orbit: cx=50, cy=52, rx=52, ry=16, rotation=25°
═══════════════════════════════════════════════ -->
<ellipse
  cx="50" cy="52" rx="52" ry="16"
  transform="rotate(25 50 52)"
  stroke="rgba(255,255,255,0.28)"
  stroke-width="2"
  stroke-dasharray="5 3"
  stroke-linecap="round"
  mask="url(#BAM)"
/>


<!-- ═══════════════════════════════════════════════
     LAYER 2 — BALLOON BODY
     Heart-shaped balloon silhouette.

     Heart reading:
       • Two lobes peak at y≈10, x≈34 and x≈66
       • Central indent descends to y≈22  (12px dip)
       • Widest point: y≈50, x=8→x=92  (84px wide)
       • Tapers to rounded bottom at (50, 88)

     The shape is read as "balloon" first, "heart" second —
     the indentation is noticed, not announced.
═══════════════════════════════════════════════ -->
<path id="BALLOON" d="
  M 50 88
  C 36 84, 8 68, 8 50
  C 8 32, 18 16, 34 10
  C 40 7, 48 13, 50 22
  C 52 13, 60 7, 66 10
  C 82 16, 92 32, 92 50
  C 92 68, 64 84, 50 88 Z
" fill="url(#BG)"/>


<!-- ═══════════════════════════════════════════════
     LAYER 3 — SPECULAR HIGHLIGHT
     Same path as balloon, filled with the shine
     gradient — bright ellipse on the lit face.
═══════════════════════════════════════════════ -->
<path d="
  M 50 88
  C 36 84, 8 68, 8 50
  C 8 32, 18 16, 34 10
  C 40 7, 48 13, 50 22
  C 52 13, 60 7, 66 10
  C 82 16, 92 32, 92 50
  C 92 68, 64 84, 50 88 Z
" fill="url(#SH)"/>


<!-- ═══════════════════════════════════════════════
     LAYER 4 — BALLOON OUTLINE
     Very thin stroke on the balloon edge.
     Gives the form a crisp, defined boundary —
     especially important on light backgrounds.
═══════════════════════════════════════════════ -->
<path d="
  M 50 88
  C 36 84, 8 68, 8 50
  C 8 32, 18 16, 34 10
  C 40 7, 48 13, 50 22
  C 52 13, 60 7, 66 10
  C 82 16, 92 32, 92 50
  C 92 68, 64 84, 50 88 Z
"
  stroke="rgba(4,46,74,0.55)"
  stroke-width="0.8"
  fill="none"
/>


<!-- ═══════════════════════════════════════════════
     LAYER 5 — FRONT ORBIT ARC  (the key 3D element)
     Drawn ON TOP of the balloon — appears to pass
     "in front" of the inflatable body.

     Orbit params: cx=50, cy=52, rx=52, ry=16, rot=25°
     Right tangent:  x = 50 + 52·cos25° = 97.1  →  97
                     y = 52 + 52·sin25° = 52+22  →  74
     Left tangent:   x = 50 − 47.1       →   3
                     y = 52 − 22.0       →  30

     SVG arc: A rx ry x-rotation large-arc sweep x y
     sweep=0 → counterclockwise → traces the BOTTOM arc ✓

     TWO passes: a soft glow layer + the sharp main line.
     Gives the ring volume and luminosity.
═══════════════════════════════════════════════ -->

<!-- Glow halo (broad, low opacity) -->
<path
  d="M 97 74 A 52 16 25 0 0 3 30"
  stroke="rgba(255,255,255,0.18)"
  stroke-width="7"
  stroke-linecap="round"
  fill="none"
/>

<!-- Mid glow -->
<path
  d="M 97 74 A 52 16 25 0 0 3 30"
  stroke="rgba(255,255,255,0.38)"
  stroke-width="4"
  stroke-linecap="round"
  fill="none"
/>

<!-- Sharp main line with gradient stroke -->
<path
  d="M 97 74 A 52 16 25 0 0 3 30"
  stroke="url(#OG)"
  stroke-width="2.2"
  stroke-linecap="round"
  fill="none"
/>


<!-- ═══════════════════════════════════════════════
     LAYER 6 — KNOT
     The small tie-off at the base of the balloon.
     Grounds the shape: "this is definitely an inflatable."
     Dark cyan — same family as the shadow gradient stop.
═══════════════════════════════════════════════ -->
<path d="
  M 47.2 89.5
  C 47   93.5, 48.8 96, 50 96.5
  C 51.2 96,   53   93.5, 52.8 89.5
  C 51.8 91.2, 51 92.2, 50 92.2
  C 49   92.2, 48.2 91.2, 47.2 89.5 Z
" fill="#042E4A" opacity="0.95"/>

</svg>
